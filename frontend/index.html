<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      display: flex;
      justify-content: center;
    }

    .phone {
      width: 360px;
      min-height: 100vh;
      background: #f5f7fa;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .header {
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: -30px 20px 20px;
      padding: 20px;
      border-radius: 15px;
      color: white;
    }

    .balance {
      font-size: 22px;
      font-weight: bold;
    }

    .section {
      padding: 15px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 90%;
      padding: 10px;
      background: #0f2a44;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }

    ul {
      text-align: left;
      padding: 10px;
    }

    .nav {
      display: flex;
      justify-content: space-around;
      background: white;
      border-top: 1px solid #ddd;
      position: fixed;
      bottom: 0;
      width: 360px;
      padding: 10px 0;
    }

    .nav div {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- LOGIN -->
  <div id="loginBox" class="section">
    <h2>🏦 MVJ Bank</h2>
    <input id="loginEmail" placeholder="Email">
    <button onclick="login()">Login</button>
    <p onclick="showPage('registerBox')">Register</p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="section hidden">
    <h2>Create Account</h2>
    <input id="regEmail" placeholder="Email">
    <button onclick="register()">Register</button>
    <button onclick="showPage('loginBox')">Back</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <div class="header">
      <h2 id="userName"></h2>
    </div>

    <div class="card">
      <p>MVJ BANK</p>
      <div class="balance">₹ <span id="balance">0</span></div>
    </div>
  </div>

  <!-- TRANSFER -->
  <div id="transferPage" class="section hidden">
    <h3>💸 Transfer Money</h3>
    <input id="receiver" placeholder="Receiver Email">
    <input id="amount" placeholder="Amount">
    <button onclick="sendMoney()">Send</button>
  </div>

  <!-- RECIPIENTS -->
  <div id="recipientsPage" class="section hidden">
    <h3>👥 Recipients</h3>
    <ul id="recipientsList"></ul>
  </div>

  <!-- HISTORY -->
  <div id="historyPage" class="section hidden">
    <h3>📜 Transactions</h3>
    <ul id="historyList"></ul>
  </div>

  <!-- NOTIFICATIONS -->
  <div id="notificationPage" class="section hidden">
    <h3>🔔 Notifications</h3>
    <ul id="notificationList"></ul>
  </div>

  <!-- NAV -->
  <div id="navBar" class="nav hidden">
    <div onclick="showPage('dashboard')">🏠<br>Home</div>
    <div onclick="showPage('transferPage')">💸<br>Send</div>
    <div onclick="showPage('recipientsPage')">👥<br>People</div>
    <div onclick="showPage('historyPage')">📜<br>History</div>
    <div onclick="showPage('notificationPage')">🔔<br>Alerts</div>
  </div>

</div>

<script>
let users = {};
let currentUser = "";
let notifications = [];

function showPage(page){
  document.querySelectorAll(".phone > div").forEach(div=>{
    if(div.id !== "navBar") div.classList.add("hidden");
  });
  document.getElementById(page).classList.remove("hidden");
}

async function login(){
  let email = loginEmail.value;

  await fetch("/api/login", {method:"POST"});

  if(!users[email]) return alert("User not found");

  currentUser = email;
  userName.innerText = "Welcome " + email;

  navBar.classList.remove("hidden");

  loadDashboard();
  showPage("dashboard");
}

function register(){
  let email = regEmail.value;

  users[email] = {balance:1000, transactions:[], recipients:[]};

  alert("Registered");
  showPage("loginBox");
}

function loadDashboard(){
  balance.innerText = users[currentUser].balance;
  updateHistory();
  updateRecipients();
  updateNotifications();
}

function sendMoney(){
  let r = receiver.value;
  let amt = parseInt(amount.value);

  if(!users[r]) return alert("Receiver not found");
  if(users[currentUser].balance < amt) return alert("Insufficient");

  users[currentUser].balance -= amt;
  users[r].balance += amt;

  let msg = `Sent ₹${amt} to ${r}`;

  users[currentUser].transactions.unshift(msg);

  if(!users[currentUser].recipients.includes(r)){
    users[currentUser].recipients.push(r);
  }

  notifications.unshift(msg);

  loadDashboard();
}

function updateHistory(){
  historyList.innerHTML="";
  users[currentUser].transactions.forEach(t=>{
    let li=document.createElement("li");
    li.innerText=t;
    historyList.appendChild(li);
  });
}

function updateRecipients(){
  recipientsList.innerHTML="";
  users[currentUser].recipients.forEach(r=>{
    let li=document.createElement("li");
    li.innerText=r;
    recipientsList.appendChild(li);
  });
}

function updateNotifications(){
  notificationList.innerHTML="";
  notifications.forEach(n=>{
    let li=document.createElement("li");
    li.innerText=n;
    notificationList.appendChild(li);
  });
}
</script>

</body>
</html>
