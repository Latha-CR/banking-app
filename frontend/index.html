<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f2a44;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .phone {
      width: 350px;
      height: 650px;
      background: white;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .header {
      background: #0f2a44;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .balance-card {
      background: white;
      margin: -20px 20px 20px;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .balance {
      font-size: 24px;
      font-weight: bold;
      color: #0f2a44;
    }

    .section {
      padding: 15px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      text-align: center;
    }

    .action {
      background: #f2f2f2;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
    }

    .transactions {
      max-height: 150px;
      overflow-y: auto;
    }

    .transactions li {
      padding: 5px;
      border-bottom: 1px solid #eee;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }

    button {
      width: 90%;
      padding: 10px;
      background: #0f2a44;
      color: white;
      border: none;
      border-radius: 8px;
    }

    #dashboard, #registerBox {
      display: none;
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- LOGIN -->
  <div id="loginBox" class="section">
    <h2>🏦 MVJ Bank</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p><a href="#" onclick="showRegister()">Register</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="section">
    <h2>Register</h2>
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="showLogin()">Back</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="header">
      <h2>Welcome User</h2>
    </div>

    <div class="balance-card">
      <p>Balance</p>
      <div class="balance">₹ <span id="balance">1000</span></div>
    </div>

    <div class="section">
      <h3>Send Money</h3>
      <input id="amount" placeholder="Enter amount">
      <button onclick="sendMoney()">Send</button>
    </div>

    <div class="section">
      <h3>Quick Actions</h3>
      <div class="actions">
        <div class="action">💧 Water</div>
        <div class="action">💡 Electricity</div>
        <div class="action">🔥 Gas</div>
        <div class="action">🛒 Shopping</div>
        <div class="action">📱 Mobile</div>
        <div class="action">💳 Card</div>
      </div>
    </div>

    <div class="section">
      <h3>Transactions</h3>
      <ul id="history" class="transactions"></ul>
    </div>

    <div class="section">
      <button onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<script>
  let balance = 1000;
  let transactions = [];

  function showRegister(){
    loginBox.style.display="none";
    registerBox.style.display="block";
  }

  function showLogin(){
    registerBox.style.display="none";
    loginBox.style.display="block";
  }

  async function login(){
    const res = await fetch("https://banking-app-6dvk.onrender.com/api/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        email: loginEmail.value,
        password: loginPassword.value
      })
    });

    if(res.ok){
      loginBox.style.display="none";
      dashboard.style.display="block";
    } else {
      alert("Invalid login");
    }
  }

  function register(){
    alert("Registered (demo)");
    showLogin();
  }

  function sendMoney(){
    let amt = parseInt(amount.value);

    if(amt > balance){
      alert("Insufficient balance");
      return;
    }

    balance -= amt;
    document.getElementById("balance").innerText = balance;

    transactions.unshift("Sent ₹"+amt);

    updateHistory();
  }

  function updateHistory(){
    let list = document.getElementById("history");
    list.innerHTML="";
    transactions.forEach(t=>{
      let li=document.createElement("li");
      li.innerText=t;
      list.appendChild(li);
    });
  }

  function logout(){
    dashboard.style.display="none";
    loginBox.style.display="block";
  }
</script>

</body>
</html>
