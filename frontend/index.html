<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; display:flex; justify-content:center; align-items:center; height:100vh;}
    .box { background:white; padding:20px; border-radius:10px; width:320px; text-align:center;}
    input { width:90%; padding:10px; margin:8px;}
    button { width:95%; padding:10px; background:purple; color:white; border:none; margin-top:10px;}
    #dashboard, #registerBox { display:none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>🏦 MVJ Bank</h2>
  <h3>Login</h3>
  <p id="msg"></p>

  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <p>New user? <a href="#" onclick="showRegister()">Register</a></p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox">
  <h3>Register</h3>
  <input id="regEmail" placeholder="Email">
  <input id="regPassword" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="showLogin()">Back</button>
</div>

<!-- DASHBOARD -->
<div class="box" id="dashboard">
  <h2>Dashboard</h2>
  <p>Balance: ₹ <span id="balance">1000</span></p>

  <h4>Send Money</h4>
  <input id="amount" placeholder="Amount">
  <button onclick="sendMoney()">Send</button>

  <h4>Transaction History</h4>
  <ul id="history"></ul>

  <button onclick="logout()">Logout</button>
</div>

<script>
  let balance = 1000;
  let transactions = [];

  function showRegister() {
    loginBox.style.display = "none";
    registerBox.style.display = "block";
  }

  function showLogin() {
    registerBox.style.display = "none";
    loginBox.style.display = "block";
  }

  async function login() {
    const email = loginEmail.value;
    const password = loginPassword.value;

    try {
      const res = await fetch("https://banking-app-6dvk.onrender.com/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email,password})
      });

      if(res.ok){
        loginBox.style.display="none";
        dashboard.style.display="block";
      } else {
        msg.innerText="Invalid login";
      }
    } catch {
      msg.innerText="Server error";
    }
  }

  function register(){
    alert("User Registered (Demo)");
    showLogin();
  }

  function sendMoney(){
    let amt = parseInt(amount.value);
    if(amt > balance){
      alert("Insufficient balance");
      return;
    }

    balance -= amt;
    document.getElementById("balance").innerText = balance;

    transactions.push("Sent ₹"+amt);

    updateHistory();
  }

  function updateHistory(){
    let list = document.getElementById("history");
    list.innerHTML = "";

    transactions.forEach(t=>{
      let li = document.createElement("li");
      li.innerText = t;
      list.appendChild(li);
    });
  }

  function logout(){
    dashboard.style.display="none";
    loginBox.style.display="block";
  }
</script>

</body>
</html>
