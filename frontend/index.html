<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px;
      width: 95%;
      background: purple;
      color: white;
      border: none;
    }
    .error {
      color: red;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>🏦 MVJ Bank</h2>
    <h3>Login</h3>

    <p id="msg" class="error"></p>

    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("https://banking-app-6dvk.onrender.com/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById("msg").style.color = "green";
          document.getElementById("msg").innerText = data.message;
        } else {
          document.getElementById("msg").innerText = data.message;
        }

      } catch (err) {
        document.getElementById("msg").innerText = "Cannot connect to server!";
      }
    }
  </script>
</body>
</html>
