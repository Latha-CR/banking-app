<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .phone {
      width: 360px;
      height: 680px;
      background: #fff;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }

    .section {
      padding: 20px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 90%;
      padding: 10px;
      background: #0f2a44;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e4f7a;
    }

    .header {
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      color: white;
      padding: 20px;
      text-align: center;
    }

    /* CARD */
    .card {
      margin: -30px 20px 20px;
      padding: 20px;
      border-radius: 15px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    .card-number {
      letter-spacing: 2px;
      margin: 10px 0;
    }

    .balance {
      font-size: 22px;
      font-weight: bold;
    }

    /* ACTIONS */
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .action {
      background: #f2f2f2;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .action:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    /* TRANSACTIONS */
    .transactions {
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      padding: 10px;
    }

    .transactions li {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    #dashboard, #registerBox {
      display: none;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1;}
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- LOGIN -->
  <div id="loginBox" class="section">
    <h2>🏦 MVJ Bank</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p><a href="#" onclick="showRegister()">Register</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="section">
    <h2>Register</h2>
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="showLogin()">Back</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="header">
      <h2>Welcome User</h2>
    </div>

    <!-- CARD -->
    <div class="card">
      <p>MVJ BANK</p>
      <div class="card-number">**** **** **** 1234</div>
      <div class="balance">₹ <span id="balance">1000</span></div>
    </div>

    <!-- SEND -->
    <div class="section">
      <h3>Send Money</h3>
      <input id="receiver" placeholder="Receiver">
      <input id="amount" placeholder="Amount">
      <button onclick="sendMoney()">Send</button>
      <button onclick="receiveMoney()">Receive ₹500</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <div class="action">💡 Bills</div>
      <div class="action">📱 Recharge</div>
      <div class="action">🛒 Shop</div>
      <div class="action">💳 Card</div>
      <div class="action">🎁 Offers</div>
      <div class="action">⚙️ Settings</div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="section">
      <h3>Transactions</h3>
      <ul id="history" class="transactions"></ul>
    </div>

    <div class="section">
      <button onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<script>
  let balance = 1000;
  let transactions = [];

  function showRegister(){
    loginBox.style.display="none";
    registerBox.style.display="block";
  }

  function showLogin(){
    registerBox.style.display="none";
    loginBox.style.display="block";
  }

  async function login(){
    const res = await fetch("https://banking-app-6dvk.onrender.com/api/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        email: loginEmail.value,
        password: loginPassword.value
      })
    });

    if(res.ok){
      loginBox.style.display="none";
      dashboard.style.display="block";
    } else {
      alert("Invalid login");
    }
  }

  function register(){
    alert("Registered (demo)");
    showLogin();
  }

  function sendMoney(){
    let receiver = document.getElementById("receiver").value;
    let amt = parseInt(document.getElementById("amount").value);

    if (!receiver || !amt) return alert("Fill all fields");
    if (amt > balance) return alert("Insufficient balance");

    balance -= amt;
    document.getElementById("balance").innerText = balance;

    transactions.unshift(`Sent ₹${amt} to ${receiver} (${new Date().toLocaleTimeString()})`);
    updateHistory();
  }

  function receiveMoney(){
    balance += 500;
    document.getElementById("balance").innerText = balance;

    transactions.unshift(`Received ₹500 (${new Date().toLocaleTimeString()})`);
    updateHistory();
  }

  function updateHistory(){
    let list = document.getElementById("history");
    list.innerHTML="";
    transactions.forEach(t=>{
      let li=document.createElement("li");
      li.innerText=t;
      list.appendChild(li);
    });
  }

  function logout(){
    dashboard.style.display="none";
    loginBox.style.display="block";
  }
</script>

</body>
</html>
