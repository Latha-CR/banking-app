<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .phone {
      width: 360px;
      min-height: 100vh;
      background: white;
      border-radius: 25px;
      overflow-y: auto;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }

    .section {
      padding: 20px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 90%;
      padding: 10px;
      background: #0f2a44;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    .header {
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      color: white;
      padding: 20px;
    }

    .card {
      margin: -30px 20px 20px;
      padding: 20px;
      border-radius: 15px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }

    .balance {
      font-size: 22px;
      font-weight: bold;
    }

    .transactions {
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      padding: 10px;
    }

    .transactions li {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    #dashboard, #registerBox {
      display: none;
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- LOGIN -->
  <div id="loginBox" class="section">
    <h2>🏦 MVJ Bank</h2>
    <input id="loginEmail" placeholder="Email">
    <button onclick="login()">Login</button>
    <p><a href="#" onclick="showRegister()">Register</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="section">
    <h2>Register</h2>
    <input id="regEmail" placeholder="Email">
    <button onclick="register()">Register</button>
    <button onclick="showLogin()">Back</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="header">
      <h2 id="welcomeUser"></h2>
    </div>

    <div class="card">
      <p>MVJ BANK</p>
      <div class="balance">₹ <span id="balance">0</span></div>
    </div>

    <div class="section">
      <h3>Send Money</h3>
      <input id="receiverInput" placeholder="Receiver Email">
      <input id="amountInput" placeholder="Amount">
      <button onclick="sendMoney()">Send</button>
    </div>

    <div class="section">
      <h3>Transactions</h3>
      <ul id="history" class="transactions"></ul>
    </div>

    <div class="section">
      <button onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<script>

  // USERS DATABASE (SIMULATION)
  let users = {
    "cerangaswamy1@gmail.com": {
      balance: 1000,
      transactions: []
    }
  };

  let currentUser = "";

  function showRegister(){
    loginBox.style.display="none";
    registerBox.style.display="block";
  }

  function showLogin(){
    registerBox.style.display="none";
    loginBox.style.display="block";
  }

  function login(){
    let email = document.getElementById("loginEmail").value;

    if(!users[email]){
      alert("User not found");
      return;
    }

    currentUser = email;

    document.getElementById("welcomeUser").innerText = "Welcome " + email;

    loginBox.style.display="none";
    dashboard.style.display="block";

    loadDashboard();
  }

  function register(){
    let email = document.getElementById("regEmail").value;

    if(users[email]){
      alert("User already exists");
      return;
    }

    users[email] = {
      balance: 1000,
      transactions: []
    };

    alert("Registered successfully");
    showLogin();
  }

  function loadDashboard(){
    document.getElementById("balance").innerText =
      users[currentUser].balance;

    updateHistory();
  }

  function sendMoney(){
    let receiver = document.getElementById("receiverInput").value;
    let amt = parseInt(document.getElementById("amountInput").value);

    if(!users[receiver]){
      alert("Receiver not registered");
      return;
    }

    if(users[currentUser].balance < amt){
      alert("Insufficient balance");
      return;
    }

    let date = new Date().toLocaleString();

    // sender
    users[currentUser].balance -= amt;
    users[currentUser].transactions.unshift({
      type:"debit",
      to: receiver,
      amount: amt,
      date
    });

    // receiver
    users[receiver].balance += amt;
    users[receiver].transactions.unshift({
      type:"credit",
      from: currentUser,
      amount: amt,
      date
    });

    loadDashboard();
  }

  function updateHistory(){
    let list = document.getElementById("history");
    list.innerHTML="";

    users[currentUser].transactions.forEach(t=>{
      let li=document.createElement("li");

      if(t.type==="debit"){
        li.innerHTML = `➡️ Sent ₹${t.amount} to ${t.to}<br>${t.date}`;
        li.style.color="red";
      } else {
        li.innerHTML = `⬅️ Received ₹${t.amount} from ${t.from}<br>${t.date}`;
        li.style.color="green";
      }

      list.appendChild(li);
    });
  }

  function logout(){
    dashboard.style.display="none";
    loginBox.style.display="block";
  }

</script>

</body>
</html>
