<!DOCTYPE html>
<html>
<head>
  <title>MVJ Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .phone {
      width: 360px;
      min-height: 100vh;
      background: #fff;
      border-radius: 25px;
      overflow-y: auto;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }

    .section {
      padding: 20px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 90%;
      padding: 10px;
      background: #0f2a44;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e4f7a;
    }

    .header {
      background: linear-gradient(135deg, #0f2a44, #1e4f7a);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .card {
      margin: -30px 20px 20px;
      padding: 20px;
      border-radius: 15px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .balance {
      font-size: 22px;
      font-weight: bold;
    }

    .transactions {
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      padding: 10px;
    }

    .transactions li {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    #dashboard, #registerBox {
      display: none;
    }
  </style>
</head>

<body>

<div class="phone">

  <!-- LOGIN -->
  <div id="loginBox" class="section">
    <h2>🏦 MVJ Bank</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p><a href="#" onclick="showRegister()">Register</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="section">
    <h2>Register</h2>
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="showLogin()">Back</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="header">
      <h2 id="welcomeUser">Welcome</h2>
    </div>

    <div class="card">
      <p>MVJ BANK</p>
      <div class="balance">₹ <span id="balance">1000</span></div>
    </div>

    <div class="section">
      <h3>Send Money</h3>
      <input id="receiver" placeholder="Receiver Email">
      <input id="amount" placeholder="Amount">
      <button onclick="sendMoney()">Send</button>
      <button onclick="receiveMoney()">Receive ₹500</button>
    </div>

    <div class="section">
      <h3>Transactions</h3>
      <ul id="history" class="transactions"></ul>
    </div>

    <div class="section">
      <button onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<script>
  let balance = 1000;
  let transactions = [];
  let users = ["cerangaswamy1@gmail.com"];
  let currentUser = "";

  function showRegister(){
    loginBox.style.display="none";
    registerBox.style.display="block";
  }

  function showLogin(){
    registerBox.style.display="none";
    loginBox.style.display="block";
  }

  async function login(){
    const email = loginEmail.value;
    const password = loginPassword.value;

    const res = await fetch("https://banking-app-6dvk.onrender.com/api/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });

    if(res.ok){
      currentUser = email;
      document.getElementById("welcomeUser").innerText = "Welcome " + email;

      loginBox.style.display="none";
      dashboard.style.display="block";
    } else {
      alert("Invalid login");
    }
  }

  function register(){
    let email = regEmail.value;

    if(users.includes(email)){
      alert("User already exists");
      return;
    }

    users.push(email);
    alert("Registered successfully");
    showLogin();
  }

  function sendMoney(){
    let receiver = document.getElementById("receiver").value;
    let amt = parseInt(document.getElementById("amount").value);

    if (!receiver || !amt) {
      alert("Fill all fields");
      return;
    }

    if (!users.includes(receiver)) {
      alert("Receiver not registered");
      return;
    }

    if (amt > balance) {
      alert("Insufficient balance");
      return;
    }

    balance -= amt;
    document.getElementById("balance").innerText = balance;

    let date = new Date().toLocaleString();

    transactions.unshift(`Sent ₹${amt} to ${receiver} (${date})`);
    updateHistory();
  }

  function receiveMoney(){
    balance += 500;
    document.getElementById("balance").innerText = balance;

    let date = new Date().toLocaleString();

    transactions.unshift(`Received ₹500 (${date})`);
    updateHistory();
  }

  function updateHistory(){
    let list = document.getElementById("history");
    list.innerHTML="";
    transactions.forEach(t=>{
      let li=document.createElement("li");
      li.innerText=t;
      list.appendChild(li);
    });
  }

  function logout(){
    dashboard.style.display="none";
    loginBox.style.display="block";
  }
</script>

</body>
</html>
